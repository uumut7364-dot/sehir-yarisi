<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şehir Yarışı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        select { width: 400px; padding: 15px; background: #111; color: #ff0000; border: 2px solid #ff0000; border-radius: 5px; font-size: 18px; margin: 20px 0; }
        .btn-vote { width: 200px; height: 200px; border-radius: 50%; background: #ff0000; border: 5px solid #500; color: white; font-weight: bold; font-size: 24px; cursor: pointer; box-shadow: 0 0 40px #ff0000; transition: 0.3s; }
        
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin: 40px 0; height: 200px; }
        .p-box { width: 160px; background: #1a1a1a; border: 2px solid #333; padding: 20px; border-radius: 10px 10px 0 0; }
        
        .list-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 30px; text-align: left; }
        .row { background: #111; padding: 10px; font-size: 13px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ŞEHRİNİ SEÇ</h1>
        <select id="citySelect"></select><br>
        <button class="btn-vote" onclick="vote()">BUTON</button>

        <div id="podium" class="podium"></div>
        <div id="list" class="list-container"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        const select = document.getElementById('citySelect');
        
        socket.on('updateScores', (scores) => {
            if(select.options.length === 0) {
                Object.keys(scores).sort().forEach(c => {
                    let opt = document.createElement('option'); opt.value = c; opt.innerHTML = c;
                    select.appendChild(opt);
                });
            }
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            
            // Podyum: 2-1-3 sırasıyla
            document.getElementById('podium').innerHTML = [sorted[1], sorted[0], sorted[2]].map((v,i) => 
                v ? `<div class="p-box"><h3>${v[0]}</h3><b>${v[1]}</b></div>` : '').join('');
            
            // 4 sütunlu liste
            document.getElementById('list').innerHTML = sorted.map((v, i) => 
                `<div class="row">${i+1}. ${v[0]} - ${v[1]}</div>`).join('');
        });

        function vote() { socket.emit('vote', select.value); }
    </script>
</body>
</html>
