<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Şehir Yarışı</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        
        select { width: 300px; padding: 15px; background: #000; color: #ff0000; border: 2px solid #ff0000; border-radius: 30px; font-size: 18px; margin: 20px 0; }
        .btn-vote { width: 180px; height: 180px; border-radius: 50%; background: #ff0000; border: 8px solid #330000; color: white; font-weight: bold; font-size: 24px; cursor: pointer; box-shadow: 0 0 30px #ff0000; transition: 0.3s; }

        /* Podyum Alanı */
        .podium-section { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin: 40px 0; height: 250px; }
        .p-box { width: 150px; background: #111; border: 2px solid #333; padding: 15px; border-radius: 10px 10px 0 0; }
        
        /* Şehir Listesi Tablosu */
        .full-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 30px; font-size: 14px; text-align: left; }
        .list-row { background: #111; padding: 8px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ŞEHRİNİ SEÇ</h1>
        <select id="citySelect"><option>Yükleniyor...</option></select>
        <br>
        <button class="btn-vote" onclick="vote()">OY VER</button>

        <div id="podium" class="podium-section"></div>
        <div id="list" class="full-list"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io(); // Render otomatik portu ayarlar
        const select = document.getElementById('citySelect');
        
        socket.on('updateScores', (scores) => {
            // Şehirleri doldur
            if(select.options[0].text === "Yükleniyor...") {
                select.innerHTML = "";
                Object.keys(scores).sort().forEach(c => {
                    let opt = document.createElement('option'); opt.value = c; opt.innerHTML = c;
                    select.appendChild(opt);
                });
            }
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            
            // Podyumu güncelle
            document.getElementById('podium').innerHTML = [sorted[1], sorted[0], sorted[2]].map((v,i) => 
                v ? `<div class="p-box"><h3>${v[0]}</h3><b>${v[1]}</b></div>` : '').join('');
            
            // Listeyi güncelle
            document.getElementById('list').innerHTML = sorted.map((v, i) => 
                `<div class="list-row">${i+1}. ${v[0]} - ${v[1]}</div>`).join('');
        });

        function vote() { socket.emit('vote', select.value); }
    </script>
</body>
</html>
